{{ define "goal_target" }}
<div id="goal-target">
    <h3>Set goal</h3>

    <form hx-post="/goal-target" hx-target="#goal-target" hx-swap="outerHTML">
        <input type="number" name="target" value="{{ .Target }}" placeholder="Задать цель" required>
        <button type="submit">Add</button>
    </form>
</div>
{{ end }}
