{{ define "deposit" }}



<div id="deposit">

    <br>

    <h3>Отложено сегодня: {{ .TotalDay }}</h3>

    <form hx-post="/deposit" hx-target="#deposit" hx-swap="outerHTML">
        <input type="text" name="amount" inputmode="numeric" placeholder="отложите до 50%" autocomplete="off">
        <button type="submit">+</button>
    </form>


    <a href="#" hx-post="/delete-deposit" hx-target="#deposit" hx-swap="outerHTML"
        hx-confirm="Удалить последнюю запись?" onclick="return false;">Undo</a>

    <div>
        Неделя: {{ .TotalWeek }} &nbsp;
        Месяц: {{ .TotalMonth }} &nbsp;
        Год: {{ .TotalYear }}
    </div>
</div>
{{ end }}
