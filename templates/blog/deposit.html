{{ define "deposit" }}

<br>

<div id="deposit">

    <span>Отложено сегодня - {{ .TotalDay }}</span>

    <form hx-post="/deposit" hx-target="#deposit" hx-swap="outerHTML">
        <input type="text" name="amount" inputmode="numeric" placeholder="отложено до 50%" autocomplete="off">
        <button type="submit">+</button>
    </form>

    <button type="button" hx-post="/delete-deposit" hx-target="#deposit" hx-swap="outerHTML">Undo</button>

    <div>
        Неделя: {{ .TotalWeek }} &nbsp;
        Месяц: {{ .TotalMonth }} &nbsp;
        Год: {{ .TotalYear }}
    </div>

</div>
{{ end }}
