{{ define "goal" }}
<div id="goal" class="goal">
    <h3>Цель: {{ .Current }} / {{ .Target }}</h3>

    <!-- Прогресс-бар -->
    <div class="progress-track">
        <div class="progress-fill" style="width: {{ .Percent }}%;"></div>
    </div>

    <p>{{ .Percent }}% выполнено</p>

    <!-- Форма задания цели -->
    <form hx-post="/goal" hx-target="#goal" hx-swap="outerHTML">
        <input type="number" name="target" placeholder="Задать цель" required>
        <button type="submit">+</button>
    </form>
</div>
{{ end }}
