{{ define "spen" }}

<div id="spen">

    <h3>Spent today: {{ .TotalDay }}</h3>
    <form hx-post="/spen" hx-target="#spen" hx-swap="outerHTML">
        <input type="text" name="amount" inputmode="numeric" placeholder="потрачено" autocomplete="off">
        <button type="submit">+</button>
    </form>


</div>
{{ end }}
