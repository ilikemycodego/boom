{{ define "statistics" }}
<div class="content" id="content">

    <h3>Spent</h3>
    <div id="result-expenses">
        <span>wk: {{ .Spen.TotalWeek }}</span>&nbsp;
        <span>mo: {{ .Spen.TotalMonth }}</span>&nbsp;
        <span>yr: {{ .Spen.TotalYear }}</span><br>
    </div>

    <a href="#" hx-post="/delete" hx-target="#content" hx-swap="outerHTML" hx-confirm="Удалить последнюю запись?"
        onclick="return false;">Undo spent</a>

    <hr>

    <h3>Saved</h3>
    <div id="result-deposits">
        wk: {{ .Deposit.TotalWeek }} &nbsp;
        mo: {{ .Deposit.TotalMonth }} &nbsp;
        yr: {{ .Deposit.TotalYear }}
    </div>

    <a href="#" hx-post="/delete-deposit" hx-target="#content" hx-swap="outerHTML"
        hx-confirm="Удалить последнюю запись?" onclick="return false;">Undo deposit</a>

    <br>
    <br>

    <a href="#" hx-post="/clear-all-data" hx-target="#content" hx-swap="outerHTML"
        hx-confirm="Вы уверены, что хотите удалить ВСЕ траты и депозиты?"
        style="color: rgb(245, 165, 165); text-decoration: none; cursor: pointer;" onclick="return false;">Delete
        data</a>

    <br><br>
    <button type="button" hx-get="/" hx-target="body" hx-swap="innerHTML">Back</button>

</div>
{{ end }}
