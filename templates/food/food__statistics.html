{{ define "food__statistics" }}
<div id="content">
    <h3>Food Log</h3>

    {{ if .Days }}
    {{ range .Days }}
    <div class="day-block">
        <div><b>{{ .Day }}</b></div>

        <div class="entries">
            {{ range .Entries }}
            <div class="entry-row">
                <span class="muted">{{ .Time }}</span>
                <span>{{ if .Tags }}{{ .Tags }}{{ else }}— empty —{{ end }}</span>
                <span class="muted">#{{ .ID }}</span>
            </div>
            {{ end }}
        </div>


    </div>
    {{ end }}
    {{ else }}
    <div class="muted">No entries yet.</div>
    {{ end }}

    <br>

    <button type="button" hx-get="/food" hx-target="#content" hx-swap="outerHTML">Back</button>
</div>
{{ end }}
