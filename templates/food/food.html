{{ define "food" }}
<div id="content">

    <h3>Meal Log</h3>

    <form id="food-form" method="post" hx-post="/food/entry" hx-target="#content" hx-swap="outerHTML">

        <input type="hidden" name="entry_date" value="{{ .Today }}">

        <div id="food-tags-cloud" class="chips">
            {{ template "food_cloud" . }}
        </div>

        <div id="food-selected">
            <div id="food-selected-inner">
                {{ template "food_selected" .SelectedTags }}
            </div>
        </div>

    </form>

    <br>

    <div>
        <h3>Satiety level :</h3>

        <span>Still hungry
            <input type="radio" name="satiety" value="hungry">

        </span><br>

        <span>Satisfied
            <input type="radio" name="satiety" value="ok">

        </span><br>

        <span>Too full
            <input type="radio" name="satiety" value="full">

        </span><br>
    </div>

    <br>

    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0px;">

        <button type="submit">Save</button>

        <button type="button" hx-post="/food/clear" hx-target="#food-selected-inner" hx-swap="innerHTML">
            Clear
        </button>

    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0px;">

        <button type="button" hx-get="/" hx-target="body" hx-swap="innerHTML">Back</button>


        <button type="button" hx-get="/food/tags" hx-target="#content" hx-swap="outerHTML">
            ⚙️ Tags
        </button>
    </div>
    <a href="#" hx-get="/food/statistics" hx-target="#content" hx-swap="outerHTML" hx-push-url="false">
        Statistics
    </a>
</div>
{{ end }}
