{{ define "food_cloud" }}

{{ range .Tags }}

<a href="#" class="chip-link" hx-post="/food/select" hx-target="#food-selected-inner" hx-include="#food-form"
    hx-swap="innerHTML" hx-vals='{"add_tag_id":"{{ .ID }}"}' hx-push-url="false">

    {{ .Name }}

</a>

{{ else }}

<div class="muted">No tags yet. Tap “⚙️ Tags” to add your first one.</div>

{{ end }}

{{ end }}
