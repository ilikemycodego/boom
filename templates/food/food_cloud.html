{{ define "food_cloud" }}
{{ range .Tags }}
<label class="chip">

    <span>{{ .Name }}</span>
    <input type="checkbox" name="tag_id" value="{{ .ID }}" {{ if .Selected }}checked{{ end }}>

</label>
{{ else }}
<div class="muted">Метки пока не созданы. Нажми “⚙️ Метки” и добавь первую.</div>
{{ end }}
{{ end }}

{{ define "food_cloud_oob" }}
<!-- hx-swap-oob: обновляем облако меток без перезагрузки страницы -->
<div id="food-tags-cloud" class="chips" hx-swap-oob="true">
    {{ template "food_cloud" . }}
</div>
{{ end }}
